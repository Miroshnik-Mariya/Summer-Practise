<div class="post-card">
  <!-- Шапка поста -->
  <div class="post-header">
    <div class="post-author-info">
      <div class="post-avatar">
        <img *ngIf="post.avatar" [src]="post.avatar" alt="Аватар">
        <i *ngIf="!post.avatar" class="bi bi-person-circle"></i>
      </div>
      <div class="post-author-details">
        <div class="post-author-name">{{ post.author }}</div>
        <div class="post-date">
          <i class="bi bi-clock me-1" style="font-size: 12px;"></i>
          {{ formattedDate }}
        </div>
      </div>
    </div>
  </div>

  <!-- Контент поста -->
  <div class="post-content">
    <p>{{ post.content }}</p>
    
    <!-- Большое изображение -->
    <div *ngIf="post.image" class="post-image-wrapper">
      <img [src]="post.image" alt="Изображение поста" class="post-image" loading="lazy">
    </div>
  </div>

  <!-- Лайки -->
  <div class="like-count" *ngIf="post.likes > 0">
    <i class="bi bi-heart-fill" style="color: #dc3545; margin-right: 6px;"></i>
    {{ post.likes }} {{ post.likes === 1 ? 'лайк' : post.likes < 5 ? 'лайка' : 'лайков' }}
  </div>

  <!-- Действия -->
  <div class="post-actions">
    <button class="action-btn" (click)="toggleLike()">
      <i class="bi" [class.bi-heart]="!post.isLiked" [class.bi-heart-fill]="post.isLiked"></i>
      <span>{{ post.isLiked ? 'Убрать лайк' : 'Нравится' }}</span>
    </button>
    
  </div>
</div>

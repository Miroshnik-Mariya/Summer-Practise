<app-add-post (postCreated)="onPostCreated()"></app-add-post>
<!-- ↑ ДОБАВЬТЕ (postCreated)="onPostCreated()" -->
<div class="feed-page">
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <!-- Заголовок ленты -->
        <div class="feed-header">
          <h2>Новости</h2>
          <p class="text-muted">Актуальные обновления и события</p>
        </div>

        <!-- Список постов -->
        <div class="posts-list">
          <app-post 
            *ngFor="let post of posts" 
            [post]="post"
          ></app-post>
        </div>

        <!-- Если постов нет -->
        <div *ngIf="posts.length === 0" class="empty-feed">
          <i class="bi bi-newspaper fs-1"></i>
          <p>Новостей пока нет</p>
          <button class="btn btn-primary mt-3" (click)="goTo('add-post')">
            Создать первый пост
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
